name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install plotting dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib seaborn pandas numpy scipy openpyxl

      - name: Run smoke test
        run: make test

      - name: Run release test
        run: make test-release
